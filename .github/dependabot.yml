version: 2
updates:
  # Java/Maven backend dependencies
  - package-ecosystem: maven
    directory: /backend-springboot
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # JavaScript/npm frontend dependencies
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
